x-openpaper: &openpaper-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      HOST_UID: 1000
      HOST_GID: 1000
      HOST_USER: sondre
      HOST_HOME: /home/sondre
  volumes:
    - .:/home/sondre/Repositories/OpenPaper
    - ~/.claude:/home/sondre/.claude
  environment:
    - CLAUDE_CODE_OAUTH_TOKEN

services:
  interactive:
    <<: *openpaper-base
    command: ["claude", "--dangerously-skip-permissions"]
    stdin_open: true
    tty: true
    profiles:
      - interactive

  test:
    <<: *openpaper-base
    command: ["uv", "run", "--project", ".", "scripts/test_flow.py", "--clean"]
    profiles:
      - test
